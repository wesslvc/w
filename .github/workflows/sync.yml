name: Sync Google Drive Index

on:
  schedule:
    # Every 6 hours (UTC 0, 6, 12, 18)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write # To commit updated data/index.json and data/updates.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Drive sync
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          # Set to "true" to extract PDF full text during sync
          EXTRACT_PDF: ${{ vars.EXTRACT_PDF || 'false' }}
        run: npm run sync

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/updates.json
          git diff --staged --quiet || git commit -m "chore: sync drive index [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
